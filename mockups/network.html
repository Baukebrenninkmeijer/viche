<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viche — Network</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg0:#2D353B; --bg1:#343F44; --bg2:#3D484D; --bg3:#475258; --bg4:#4F585E;
      --fg:#D3C6AA; --fg-dim:#859289;
      --green:#A7C080; --aqua:#83C092; --blue:#7FBBB3; --yellow:#DBBC7F;
      --purple:#D699B6; --orange:#E69875; --red:#E67E80;
      --border:rgba(255,255,255,0.07); --card-bg:#343F44; --hover:rgba(255,255,255,0.04);
      --edge-stroke:rgba(255,255,255,0.15);
    }
    :root[data-theme="light"] {
      --bg0:#FDF6E3; --bg1:#F4F0D9; --bg2:#EFEBD4; --bg3:#E6E2CC; --bg4:#DDD8BE;
      --fg:#5C6A72; --fg-dim:#829181;
      --green:#8DA101; --aqua:#35A77C; --blue:#3A94C5; --purple:#DF69BA;
      --yellow:#DFA000; --orange:#F57D26; --red:#F85552;
      --border:rgba(0,0,0,0.09); --card-bg:#F4F0D9; --hover:rgba(0,0,0,0.03);
      --edge-stroke:rgba(0,0,0,0.12);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:14px}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
      background:var(--bg0);color:var(--fg);line-height:1.5;
      display:flex;height:100vh;overflow:hidden;
    }

    /* ── Sidebar ── */
    .sidebar{width:216px;min-width:216px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .sidebar-header{padding:18px 14px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--green),var(--aqua));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#1a2420;flex-shrink:0}
    .logo-text{font-size:15px;font-weight:600;letter-spacing:-0.3px;color:var(--fg)}
    .logo-sub{font-size:10px;color:var(--fg-dim);font-family:"SF Mono","Fira Code",monospace}
    .sidebar-section{padding:10px 6px 4px}
    .sidebar-label{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--fg-dim);padding:0 8px;margin-bottom:2px}
    .nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;color:var(--fg-dim);font-size:13px;font-weight:450;transition:background .1s,color .1s;text-decoration:none;user-select:none}
    .nav-item:hover{background:var(--hover);color:var(--fg)}
    .nav-item.active{background:var(--hover);color:var(--fg);font-weight:500}
    .nav-icon{width:15px;height:15px;opacity:.7;flex-shrink:0}
    .nav-item.active .nav-icon{opacity:1}
    .nav-badge{margin-left:auto;font-size:10px;font-weight:600;font-family:"SF Mono",monospace;background:var(--bg3);color:var(--fg-dim);padding:1px 6px;border-radius:10px}
    .nav-badge.live{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
    .divider{height:1px;background:var(--border);margin:4px 6px}
    .sidebar-spacer{flex:1}
    .sidebar-footer{padding:10px 6px;border-top:1px solid var(--border)}

    /* ── Dot ── */
    .dot{width:6px;height:6px;border-radius:50%;display:inline-block;background:var(--green);animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

    /* ── Main ── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .topbar{height:50px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg0);display:flex;align-items:center;padding:0 22px;gap:8px}
    .topbar-title{font-size:13.5px;font-weight:600;color:var(--fg)}
    .topbar-crumb{font-size:12px;color:var(--fg-dim)}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .ws-label{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--fg-dim)}
    .btn-ghost{background:none;border:1px solid var(--border);border-radius:6px;color:var(--fg-dim);cursor:pointer;padding:5px 10px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;transition:background .1s,color .1s}
    .btn-ghost:hover{background:var(--hover);color:var(--fg)}

    /* ── Content: 3-col ── */
    .content-3col{flex:1;display:flex;overflow:hidden}

    /* Left panel */
    .panel-left{width:240px;min-width:240px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg1)}
    .panel-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--fg)}
    .panel-header .count{font-size:10px;font-weight:600;font-family:"SF Mono",monospace;background:var(--bg3);color:var(--fg-dim);padding:1px 6px;border-radius:10px}
    .agent-list{flex:1;overflow-y:auto;padding:6px}
    .agent-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .1s}
    .agent-row:hover,.agent-row.highlighted{background:var(--hover)}
    .agent-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .agent-info{flex:1;min-width:0}
    .agent-name{font-size:12px;font-weight:500;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .agent-id{font-size:10px;color:var(--fg-dim);font-family:"SF Mono",monospace}
    .status-pill{font-size:9px;font-weight:600;padding:1px 6px;border-radius:8px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
    .status-idle{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)}
    .status-busy{background:color-mix(in srgb,var(--yellow) 15%,transparent);color:var(--yellow)}
    .status-offline{background:var(--bg3);color:var(--fg-dim)}

    /* Centre panel */
    .panel-center{flex:1;position:relative;overflow:hidden;background:var(--bg0)}
    .panel-center svg{display:block}
    .live-mesh-badge{position:absolute;top:12px;left:14px;display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--green);pointer-events:none}

    /* Right panel */
    .panel-right{width:280px;min-width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg1)}
    .event-list{flex:1;overflow-y:auto;padding:6px}
    .event-row{padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px}
    .event-time{font-family:"SF Mono",monospace;font-size:10px;color:var(--fg-dim)}
    .event-route{margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
    .event-route .edot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
    .event-route .arrow{color:var(--fg-dim);font-size:10px}
    .event-route .ename{font-size:11px;color:var(--fg)}
    .type-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:6px;text-transform:uppercase;letter-spacing:0.3px;margin-left:auto;flex-shrink:0}
    .type-task{background:color-mix(in srgb,var(--blue) 18%,transparent);color:var(--blue)}
    .type-ack{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
    .type-result{background:color-mix(in srgb,var(--purple) 18%,transparent);color:var(--purple)}
    .type-join{background:color-mix(in srgb,var(--orange) 18%,transparent);color:var(--orange)}

    /* ── Bottom bar ── */
    .bottombar{height:28px;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg1);display:flex;align-items:center;padding:0 14px;gap:18px;font-size:10px;color:var(--fg-dim);font-family:"SF Mono",monospace}
    .bottombar .dot{width:5px;height:5px}

    /* ── Graph pulse animation ── */
    @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1.0}}
    .node-ring{animation:pulse 3s ease-in-out infinite}
    .node-ring.selected{stroke-width:3!important;opacity:1!important;animation:none}

    /* ── Node tooltip ── */
    .node-tooltip{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:500;color:var(--fg);pointer-events:none;white-space:nowrap;display:none;z-index:10}

    /* ── Pause button ── */
    .btn-pause{background:none;border:none;cursor:pointer;color:var(--fg-dim);font-size:13px;padding:2px 4px;transition:color .1s}
    .btn-pause:hover{color:var(--fg)}
  </style>
</head>
<body>

<!-- ═══════════ Main ═══════════ -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <span class="topbar-title">Network</span>
    <span class="topbar-crumb">/ live</span>
    <div class="topbar-right">
      <span class="ws-label"><span class="dot"></span> Live</span>
      <span class="btn-ghost" style="pointer-events:none"><span class="dot" style="width:5px;height:5px"></span> 12 online</span>
      <button class="btn-ghost" id="themeToggle" title="Toggle theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <!-- 3-column content -->
  <div class="content-3col">

    <!-- LEFT: Agent Roster -->
    <div class="panel-left">
      <div class="panel-header">Agents <span class="count">9</span></div>
      <div class="agent-list" id="agentList"></div>
    </div>

    <!-- CENTRE: D3 Graph -->
    <div class="panel-center" id="graphPanel">
      <div class="live-mesh-badge"><span class="dot"></span> LIVE MESH</div>
      <div class="node-tooltip" id="nodeTooltip"></div>
    </div>

    <!-- RIGHT: Event Stream -->
    <div class="panel-right">
      <div class="panel-header">Events <button class="btn-pause" id="pauseBtn" title="Pause">&#9646;&#9646;</button></div>
      <div class="event-list" id="eventList"></div>
    </div>

  </div>

  <!-- Bottom bar -->
  <footer class="bottombar">
    <span style="display:flex;align-items:center;gap:5px"><span class="dot"></span> ws://localhost:4000</span>
    <span>registry: local</span>
    <span>agents: 9</span>
    <span>messages today: 1,247</span>
  </footer>

</div>

<script>
// ── Data ──
const AGENTS = [
  { id:"a1b2", name:"aris-prod",         color:"#D699B6", status:"idle" },
  { id:"c3d4", name:"claude-code-1",     color:"#7FBBB3", status:"busy" },
  { id:"e5f6", name:"geth-hivemind",     color:"#A7C080", status:"idle" },
  { id:"g7h8", name:"opencode-worker-3", color:"#DBBC7F", status:"busy" },
  { id:"i9j0", name:"researcher-v2",     color:"#83C092", status:"idle" },
  { id:"k1l2", name:"demo-agent-joel",   color:"#E69875", status:"idle" },
  { id:"m3n4", name:"demo-agent-ihor",   color:"#E67E80", status:"idle" },
  { id:"o5p6", name:"linear-bot",        color:"#7FBBB3", status:"idle" },
  { id:"q7r8", name:"writer-agent",      color:"#859289", status:"offline" },
];

const LINKS = [
  { source:"a1b2", target:"c3d4" },
  { source:"e5f6", target:"c3d4" },
  { source:"e5f6", target:"a1b2" },
  { source:"g7h8", target:"c3d4" },
  { source:"i9j0", target:"a1b2" },
  { source:"k1l2", target:"e5f6" },
  { source:"m3n4", target:"e5f6" },
  { source:"o5p6", target:"a1b2" },
];

const MSG_TYPES = ["task","ack","result","join"];
const agentMap = Object.fromEntries(AGENTS.map(a => [a.id, a]));

// ── Theme ──
document.getElementById("themeToggle").addEventListener("click", () => {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
});

// ── Agent Roster ──
const agentListEl = document.getElementById("agentList");
AGENTS.forEach(a => {
  const row = document.createElement("div");
  row.className = "agent-row";
  row.dataset.agentId = a.id;
  row.innerHTML = `
    <span class="agent-dot" style="background:${a.color}"></span>
    <div class="agent-info">
      <div class="agent-name">${a.name}</div>
      <div class="agent-id">${a.id}</div>
    </div>
    <span class="status-pill status-${a.status}">${a.status}</span>
  `;
  row.addEventListener("mouseenter", () => highlightNode(a.id, true));
  row.addEventListener("mouseleave", () => highlightNode(a.id, false));
  agentListEl.appendChild(row);
});

function highlightNode(id, on) {
  d3.selectAll(".node-ring").filter(d => d.id === id)
    .classed("selected", on);
  const row = agentListEl.querySelector(`[data-agent-id="${id}"]`);
  if (row) row.classList.toggle("highlighted", on);
}

// ── D3 Graph ──
const panel = document.getElementById("graphPanel");
const tooltip = document.getElementById("nodeTooltip");

const nodesData = AGENTS.map(d => ({...d}));
const linksData = LINKS.map(d => ({source: d.source, target: d.target}));

const svg = d3.select("#graphPanel").append("svg")
  .attr("width", "100%")
  .attr("height", "100%");

let width = panel.clientWidth;
let height = panel.clientHeight;
svg.attr("viewBox", `0 0 ${width} ${height}`);

const linkG = svg.append("g");
const nodeG = svg.append("g");
const pulseG = svg.append("g");

const linkEls = linkG.selectAll("line")
  .data(linksData).join("line")
  .attr("stroke", "var(--edge-stroke)")
  .attr("stroke-width", 1)
  .attr("stroke-dasharray", "6,4");

const nodeGroups = nodeG.selectAll("g")
  .data(nodesData).join("g")
  .style("cursor", "pointer");

nodeGroups.append("circle")
  .attr("class", "node-ring")
  .attr("r", 18)
  .attr("fill", "none")
  .attr("stroke", d => d.color)
  .attr("stroke-width", 1.5)
  .attr("opacity", 0.6);

nodeGroups.append("circle")
  .attr("r", 6)
  .attr("fill", d => d.color);

nodeGroups.append("text")
  .text(d => d.name)
  .attr("text-anchor", "middle")
  .attr("dy", 28)
  .attr("font-size", "11px")
  .attr("fill", "var(--fg-dim)")
  .attr("font-family", "-apple-system, BlinkMacSystemFont, 'Inter', sans-serif");

// Click to select node
let selectedNode = null;
nodeGroups.on("click", function(event, d) {
  d3.selectAll(".node-ring").classed("selected", false);
  if (selectedNode === d.id) {
    selectedNode = null;
    tooltip.style.display = "none";
  } else {
    selectedNode = d.id;
    d3.select(this).select(".node-ring").classed("selected", true);
    tooltip.textContent = d.name;
    tooltip.style.display = "block";
    const rect = panel.getBoundingClientRect();
    tooltip.style.left = (d.x - rect.left + 24) + "px";
    tooltip.style.top = (d.y - rect.top - 10) + "px";
  }
});

// Drag
nodeGroups.call(d3.drag()
  .on("start", (event, d) => { if (!event.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
  .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
  .on("end", (event, d) => { if (!event.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
);

const sim = d3.forceSimulation(nodesData)
  .force("link", d3.forceLink(linksData).id(d => d.id).distance(160))
  .force("charge", d3.forceManyBody().strength(-600))
  .force("center", d3.forceCenter(width / 2, height / 2));

sim.on("tick", () => {
  linkEls
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  nodeGroups.attr("transform", d => `translate(${d.x},${d.y})`);

  // Update tooltip position if node selected
  if (selectedNode) {
    const nd = nodesData.find(n => n.id === selectedNode);
    if (nd) {
      tooltip.style.left = (nd.x + 24) + "px";
      tooltip.style.top = (nd.y - 10) + "px";
    }
  }
});

// Resize
window.addEventListener("resize", () => {
  width = panel.clientWidth;
  height = panel.clientHeight;
  svg.attr("viewBox", `0 0 ${width} ${height}`);
  sim.force("center", d3.forceCenter(width / 2, height / 2));
  sim.alpha(0.3).restart();
});

// ── Message pulse animation ──
let paused = false;

function fireMessage() {
  if (paused) return;
  const link = linksData[Math.floor(Math.random() * linksData.length)];
  const srcAgent = agentMap[link.source.id || link.source];
  const tgtAgent = agentMap[link.target.id || link.target];
  const srcColor = srcAgent ? srcAgent.color : "#fff";

  // Animate dot along edge
  pulseG.append("circle")
    .attr("r", 4)
    .attr("fill", srcColor)
    .attr("opacity", 0.9)
    .attr("cx", link.source.x)
    .attr("cy", link.source.y)
    .transition().duration(900).ease(d3.easeQuadInOut)
    .attr("cx", link.target.x)
    .attr("cy", link.target.y)
    .attr("opacity", 0.3)
    .remove();

  // Briefly highlight the edge
  linkEls.filter(d => d === link)
    .attr("stroke", srcColor).attr("stroke-width", 2)
    .transition().duration(600)
    .attr("stroke", "var(--edge-stroke)").attr("stroke-width", 1);

  // Add event
  addEvent(srcAgent, tgtAgent);
}

const msgInterval = setInterval(fireMessage, 1000);

// ── Event Stream ──
const eventListEl = document.getElementById("eventList");
let eventCounter = 0;

function timeStr() {
  return new Date().toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

function addEvent(src, tgt) {
  if (!src || !tgt) return;
  const type = MSG_TYPES[Math.floor(Math.random() * MSG_TYPES.length)];
  const row = document.createElement("div");
  row.className = "event-row";
  row.innerHTML = `
    <div class="event-time">${timeStr()}</div>
    <div class="event-route">
      <span class="edot" style="background:${src.color}"></span>
      <span class="ename">${src.name}</span>
      <span class="arrow">&rarr;</span>
      <span class="edot" style="background:${tgt.color}"></span>
      <span class="ename">${tgt.name}</span>
      <span class="type-badge type-${type}">${type}</span>
    </div>
  `;
  eventListEl.prepend(row);
  // Cap at 50 rows
  while (eventListEl.children.length > 50) eventListEl.lastChild.remove();
}

// Pre-populate 5 events
const prePairs = [
  ["a1b2","c3d4"],["e5f6","a1b2"],["k1l2","e5f6"],["g7h8","c3d4"],["i9j0","a1b2"]
];
prePairs.forEach(([s,t]) => addEvent(agentMap[s], agentMap[t]));

// ── Pause ──
const pauseBtn = document.getElementById("pauseBtn");
pauseBtn.addEventListener("click", () => {
  paused = !paused;
  pauseBtn.innerHTML = paused ? "&#9654;" : "&#9646;&#9646;";
  pauseBtn.title = paused ? "Resume" : "Pause";
});
</script>
